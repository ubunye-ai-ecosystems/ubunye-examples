MODEL: "ml"
VERSION: "1.0.0"

# Train a model on the taxi features, and register it if it earns its place.
#
# This config is BYTE-FOR-BYTE IDENTICAL across train_sklearn, train_torch and
# train_keras — deliberately, and CI runs `diff` to keep it that way. It does not
# name a framework anywhere, because it does not know about one.
#
# That is the whole argument of this example: the engine sees inputs, a transform and
# outputs. Whether a gradient-boosted tree or a neural network is behind
# transformations.py is a fact about model.py, and nothing else needs to know it.
#
# Reads the feature table written by example 04 — run `ml_taxi_fare` first.

ENGINE:
  spark_conf:
    spark.sql.shuffle.partitions: "8"
  profiles:
    DEV:
      spark_conf:
        spark.sql.shuffle.partitions: "4"
    PROD:
      spark_conf:
        spark.sql.shuffle.partitions: "8"

CONFIG:
  inputs:
    # Three splits, declared separately so you can see — without reading a line of
    # Python — that the model is judged on rows it was not fitted on, and ranked on
    # rows it was not even gated against.
    train:
      format: unity
      sql: |
        SELECT * FROM {{ env.UBUNYE_CATALOG | default('workspace') }}.{{ env.UBUNYE_SCHEMA | default('ubunye_examples') }}.taxi_features
        WHERE split = 'train'

    test:
      format: unity
      sql: |
        SELECT * FROM {{ env.UBUNYE_CATALOG | default('workspace') }}.{{ env.UBUNYE_SCHEMA | default('ubunye_examples') }}.taxi_features
        WHERE split = 'test'

    score:
      format: unity
      sql: |
        SELECT * FROM {{ env.UBUNYE_CATALOG | default('workspace') }}.{{ env.UBUNYE_SCHEMA | default('ubunye_examples') }}.taxi_features
        WHERE split = 'score'

  transform: {}

  outputs:
    # All three trainers append to ONE table. They run in parallel, and Delta's
    # optimistic concurrency makes concurrent appends safe — append-append does not
    # conflict. Three tasks overwriting one table would.
    fare_bench_metrics:
      format: unity
      table: "{{ env.UBUNYE_CATALOG | default('workspace') }}.{{ env.UBUNYE_SCHEMA | default('ubunye_examples') }}.fare_bench_metrics"
      mode: append
      file_format: delta
      options:
        mergeSchema: "true"
        comment: "Every metric of every framework. score_* is what the leaderboard ranks on."
