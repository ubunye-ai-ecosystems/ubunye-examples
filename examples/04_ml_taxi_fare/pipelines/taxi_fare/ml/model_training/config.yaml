MODEL: "ml"
VERSION: "1.0.0"

# Model training: fit on `train`, judge on `test`, register only if it earns it.
#
# Two inputs, not one, and both come from the feature table the previous task
# wrote. Declaring them separately means the split is visible in the config — you
# can see, without reading a line of Python, that this task is judged on rows it
# was not fitted on.

ENGINE:
  spark_conf:
    spark.sql.shuffle.partitions: "8"
  profiles:
    DEV:
      spark_conf:
        spark.sql.shuffle.partitions: "4"
    PROD:
      spark_conf:
        spark.sql.shuffle.partitions: "8"

CONFIG:
  inputs:
    train:
      format: unity
      sql: |
        SELECT * FROM {{ env.UBUNYE_CATALOG | default('workspace') }}.{{ env.UBUNYE_SCHEMA | default('ubunye_examples') }}.taxi_features
        WHERE split = 'train'

    test:
      format: unity
      sql: |
        SELECT * FROM {{ env.UBUNYE_CATALOG | default('workspace') }}.{{ env.UBUNYE_SCHEMA | default('ubunye_examples') }}.taxi_features
        WHERE split = 'test'

  transform: {}

  outputs:
    # The audit trail. One row per metric per version — long-form, because a
    # column per metric would change this table's schema the day someone adds one,
    # and it is appended to forever.
    model_metrics:
      format: unity
      table: "{{ env.UBUNYE_CATALOG | default('workspace') }}.{{ env.UBUNYE_SCHEMA | default('ubunye_examples') }}.taxi_model_metrics"
      mode: append
      file_format: delta
      options:
        mergeSchema: "true"
        comment: "Every metric of every trained version. test_* are the numbers that count."
