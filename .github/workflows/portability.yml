name: portability

# "Define once, run anywhere" — checked, not claimed.
#
# The same task directory runs on every platform below, and each one prints a
# fingerprint of what it wrote. The last job asserts the fingerprints are IDENTICAL.
#
# That assertion is the whole point. Without it, "portable" degrades to "it did not
# crash on any of them", which is a much weaker claim than the README makes — and it
# is the version of this test that everyone else ships.

on:
  push:
    branches: [main]
    paths: ["examples/11_run_anywhere/**", "platforms/**", ".github/workflows/portability.yml"]
  pull_request:
    paths: ["examples/11_run_anywhere/**", "platforms/**", ".github/workflows/portability.yml"]
  workflow_dispatch:

jobs:
  local:
    name: local Spark (no Databricks, no cloud)
    runs-on: ubuntu-latest
    outputs:
      fingerprint: ${{ steps.run.outputs.fingerprint }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install the released engine + Spark + Delta
        # Pinned as a matched pair — see the note in platforms/docker/Dockerfile.
        #
        # `requests` is installed EXPLICITLY, and that is a bug in the engine, not a
        # quirk of this workflow: it lives in the `dev` extra, so
        # `pip install ubunye-engine[spark]` ships a rest_api reader that cannot make
        # a request. It works on Databricks purely because DBR preinstalls it. This
        # step failed with `No module named 'requests'` the first time example 02 ran
        # off Databricks — which is the only place the bug is visible.
        run: pip install "pyspark==3.5.3" "delta-spark==3.2.0" "ubunye-engine[spark,ml]==0.3.0" "requests>=2.28"

      - name: Run the task
        id: run
        run: |
          set -euo pipefail
          chmod +x platforms/local/run.sh platforms/run_task.sh
          platforms/local/run.sh | tee out.txt
          echo "fingerprint=$(grep -oP 'FINGERPRINT=\K.*' out.txt)" >> "$GITHUB_OUTPUT"

      - name: 02 · REST ingestion — off Databricks
        # Proves the rest_api connector works with no Databricks anywhere. It also
        # proves the packaging bug is real: `requests` is only in the engine's `dev`
        # extra, so this fails unless it is installed explicitly. On Databricks it
        # works by accident, because DBR preinstalls it.
        run: platforms/run_task.sh examples/02_ingest_rest_api weather ingestion hourly_forecast

      - name: 09 · JDBC — the example Databricks serverless CANNOT run
        # Serverless ships no JDBC drivers and cannot install a JAR. On open-source
        # Spark it is one Maven coordinate. The "restricted" platform is the managed one.
        run: platforms/run_task.sh examples/09_jdbc_ingest rnacentral ingestion ingest_rna

      - name: Seed the source tables — same schema as samples.*, different rows
        # The examples read samples.nyctaxi / samples.bakehouse, which exist only
        # inside a Databricks workspace. This creates tables with the SAME names,
        # columns and types in a local Hive metastore, filled with data we generate.
        #
        # The data is not the point. The process is. The pipelines below do not change
        # by a character — they resolve against a different catalog, and that is one
        # environment variable.
        env:
          SOURCE_CATALOG: spark_catalog
        run: |
          set -euo pipefail
          export PYSPARK_SUBMIT_ARGS="--packages io.delta:delta-spark_2.12:3.2.0             --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension             --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog             --conf spark.sql.catalogImplementation=hive             --conf spark.sql.warehouse.dir=/tmp/ubunye/warehouse             --conf javax.jdo.option.ConnectionURL=jdbc:derby:;databaseName=/tmp/ubunye/metastore_db;create=true             pyspark-shell"
          python platforms/seed.py

      - name: 01 · tables + SQL pushdown — off Databricks
        # `format: unity` is only ever spark.table() and spark.sql(), so it works
        # against a plain Hive metastore. The SQL join is pushed down exactly as it is
        # on Databricks. The config is untouched.
        env: &offdbx
          SOURCE_CATALOG: spark_catalog
          UBUNYE_CATALOG: spark_catalog
          UBUNYE_SCHEMA: ubunye_examples
          UBUNYE_SINK: unity
        run: platforms/run_task.sh examples/01_ingest_tables_sql retail ingestion customer_revenue

      - name: 07 · data quality — the contract, enforced off Databricks
        # Same rules, same severities, same quarantine. Different rows.
        env: *offdbx
        run: platforms/run_task.sh examples/07_data_quality quality contracts validate_transactions

      - name: 04 · the full ML lifecycle — off Databricks
        # features -> train -> gate -> register -> promote -> score, on open-source
        # Spark with a local model registry. The registry is pathlib-based, so a plain
        # directory is all it needs.
        env:
          SOURCE_CATALOG: spark_catalog
          UBUNYE_CATALOG: spark_catalog
          UBUNYE_SCHEMA: ubunye_examples
          UBUNYE_SINK: unity
          TAXI_MODEL_STORE: /tmp/ubunye/model_store
        run: |
          platforms/run_task.sh examples/04_ml_taxi_fare taxi_fare ml             feature_engineering model_training batch_inference

      - name: What actually landed on disk
        run: |
          python - <<'PY'
          from pyspark.sql import SparkSession
          spark = (SparkSession.builder.appName("check")
                   .config("spark.sql.extensions", "io.delta.sql.DeltaSparkSessionExtension")
                   .config("spark.sql.catalog.spark_catalog",
                           "org.apache.spark.sql.delta.catalog.DeltaCatalog")
                   .config("spark.sql.warehouse.dir", "/tmp/ubunye/warehouse")
                   .config("javax.jdo.option.ConnectionURL",
                           "jdbc:derby:;databaseName=/tmp/ubunye/metastore_db;create=true")
                   .enableHiveSupport()
                   .getOrCreate())
          spark.sparkContext.setLogLevel("ERROR")
          for t in ["hourly_forecast", "rna_databases", "rna_sequence_profile"]:
              n = spark.read.format("delta").load(f"/tmp/ubunye/{t}").count()
              print(f"  path  {t:<26} {n} rows")
              assert n > 0, f"{t} is empty"

          # And the examples that ran with format: unity against a plain Hive
          # metastore — the same configs Databricks runs, unchanged.
          spark.sql("USE CATALOG spark_catalog")
          for t in ["franchise_revenue", "clean_transactions", "quarantined_transactions",
                    "contract_results", "taxi_features", "taxi_model_metrics",
                    "taxi_fare_predictions"]:
              n = spark.table(f"ubunye_examples.{t}").count()
              print(f"  table {t:<26} {n} rows")
              assert n > 0, f"{t} is empty"
          PY

  docker:
    name: Docker container
    runs-on: ubuntu-latest
    outputs:
      fingerprint: ${{ steps.run.outputs.fingerprint }}
    steps:
      - uses: actions/checkout@v4

      - name: Build the image
        run: docker build -f platforms/docker/Dockerfile -t ubunye-portable:ci .

      - name: Run the task in the container
        id: run
        run: |
          set -euo pipefail
          docker run --rm ubunye-portable:ci | tee out.txt
          echo "fingerprint=$(grep -oP 'FINGERPRINT=\K.*' out.txt)" >> "$GITHUB_OUTPUT"

      - name: 02 · REST ingestion, in the container
        run: docker run --rm ubunye-portable:ci examples/02_ingest_rest_api weather ingestion hourly_forecast

      - name: 09 · JDBC, in the container
        run: docker run --rm ubunye-portable:ci examples/09_jdbc_ingest rnacentral ingestion ingest_rna

  kubernetes:
    name: Kubernetes (kind)
    runs-on: ubuntu-latest
    outputs:
      fingerprint: ${{ steps.run.outputs.fingerprint }}
    steps:
      - uses: actions/checkout@v4

      - name: Build the image
        run: docker build -f platforms/docker/Dockerfile -t ubunye-portable:ci .

      - name: Create a cluster
        uses: helm/kind-action@v1
        with: { cluster_name: ubunye }

      - name: Load the image into the cluster
        # kind nodes cannot see the host's docker daemon, so the image has to be
        # side-loaded. Skip this and the pod sits in ImagePullBackOff forever,
        # trying to fetch a tag that only exists on the runner.
        run: kind load docker-image ubunye-portable:ci --name ubunye

      - name: Run the task as a Kubernetes Job
        id: run
        run: |
          set -euo pipefail
          kubectl apply -f platforms/k8s/job.yaml
          kubectl wait --for=condition=complete --timeout=15m job/ubunye-portable \
            || { kubectl logs job/ubunye-portable --tail=100; exit 1; }
          kubectl logs job/ubunye-portable | tee out.txt
          echo "fingerprint=$(grep -oP 'FINGERPRINT=\K.*' out.txt)" >> "$GITHUB_OUTPUT"

  identical:
    name: every platform produced the same output
    runs-on: ubuntu-latest
    needs: [local, docker, kubernetes]
    steps:
      - name: Compare the fingerprints
        run: |
          set -euo pipefail
          LOCAL='${{ needs.local.outputs.fingerprint }}'
          DOCKER='${{ needs.docker.outputs.fingerprint }}'
          K8S='${{ needs.kubernetes.outputs.fingerprint }}'

          printf '  %-22s %s\n' "local Spark:" "$LOCAL" "Docker:" "$DOCKER" "Kubernetes:" "$K8S"

          # An empty fingerprint means the run produced nothing and the grep found
          # nothing — which would otherwise sail through as "all three matched".
          for f in "$LOCAL" "$DOCKER" "$K8S"; do
            [ -n "$f" ] || { echo "::error::a platform produced NO fingerprint"; exit 1; }
          done

          if [ "$LOCAL" = "$DOCKER" ] && [ "$LOCAL" = "$K8S" ]; then
            echo "::notice::identical output on all three platforms — $LOCAL"
          else
            echo "::error::the platforms disagree. Same config, same code, different data."
            exit 1
          fi
