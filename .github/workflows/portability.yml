name: portability

# "Define once, run anywhere" — checked, not claimed.
#
# The same task directory runs on every platform below, and each one prints a
# fingerprint of what it wrote. The last job asserts the fingerprints are IDENTICAL.
#
# That assertion is the whole point. Without it, "portable" degrades to "it did not
# crash on any of them", which is a much weaker claim than the README makes — and it
# is the version of this test that everyone else ships.

on:
  push:
    branches: [main]
    paths: ["examples/11_run_anywhere/**", "platforms/**", ".github/workflows/portability.yml"]
  pull_request:
    paths: ["examples/11_run_anywhere/**", "platforms/**", ".github/workflows/portability.yml"]
  workflow_dispatch:

jobs:
  local:
    name: local Spark (no Databricks, no cloud)
    runs-on: ubuntu-latest
    outputs:
      fingerprint: ${{ steps.run.outputs.fingerprint }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install the released engine + Spark + Delta
        # Pinned as a matched pair — see the note in platforms/docker/Dockerfile.
        #
        # `requests` is installed EXPLICITLY, and that is a bug in the engine, not a
        # quirk of this workflow: it lives in the `dev` extra, so
        # `pip install ubunye-engine[spark]` ships a rest_api reader that cannot make
        # a request. It works on Databricks purely because DBR preinstalls it. This
        # step failed with `No module named 'requests'` the first time example 02 ran
        # off Databricks — which is the only place the bug is visible.
        run: pip install "pyspark==3.5.3" "delta-spark==3.2.0" "ubunye-engine[spark,ml]==0.3.0" "requests>=2.28"

      - name: Run the task
        id: run
        run: |
          set -euo pipefail
          platforms/local/run.sh | tee out.txt
          echo "fingerprint=$(grep -oP 'FINGERPRINT=\K.*' out.txt)" >> "$GITHUB_OUTPUT"

      - name: 02 · REST ingestion — off Databricks
        # Proves the rest_api connector works with no Databricks anywhere. It also
        # proves the packaging bug is real: `requests` is only in the engine's `dev`
        # extra, so this fails unless it is installed explicitly. On Databricks it
        # works by accident, because DBR preinstalls it.
        run: platforms/run_task.sh examples/02_ingest_rest_api weather ingestion hourly_forecast

      - name: 09 · JDBC — the example Databricks serverless CANNOT run
        # Serverless ships no JDBC drivers and cannot install a JAR. On open-source
        # Spark it is one Maven coordinate. The "restricted" platform is the managed one.
        run: platforms/run_task.sh examples/09_jdbc_ingest rnacentral ingestion ingest_rna

      - name: Seed the source tables — same schema as samples.*, different rows
        # The examples read samples.nyctaxi / samples.bakehouse, which exist only
        # inside a Databricks workspace. This creates tables with the SAME names,
        # columns and types in a local Hive metastore, filled with data we generate.
        #
        # The data is not the point. The process is. The pipelines below do not change
        # by a character — they resolve against a different catalog, and that is one
        # environment variable.
        env:
          SOURCE_CATALOG: spark_catalog
          UBUNYE_SCHEMA: ubunye_examples
        run: |
          set -euo pipefail
          . platforms/spark_env.sh
          python platforms/seed.py

      - name: 01 · tables + SQL pushdown — off Databricks
        # `format: unity` is only ever spark.table() and spark.sql(), so it works
        # against a plain Hive metastore. The SQL join is pushed down exactly as it is
        # on Databricks. The config is untouched.
        env: &offdbx
          SOURCE_CATALOG: spark_catalog
          UBUNYE_CATALOG: spark_catalog
          UBUNYE_SCHEMA: ubunye_examples
          UBUNYE_SINK: unity
        run: platforms/run_task.sh examples/01_ingest_tables_sql retail ingestion customer_revenue

      - name: 07 · data quality — the contract, enforced off Databricks
        # Same rules, same severities, same quarantine. Different rows.
        env: *offdbx
        run: platforms/run_task.sh examples/07_data_quality quality contracts validate_transactions

      - name: 04 · the full ML lifecycle — off Databricks
        # features -> train -> gate -> register -> promote -> score, on open-source
        # Spark with a local model registry. The registry is pathlib-based, so a plain
        # directory is all it needs.
        env:
          SOURCE_CATALOG: spark_catalog
          UBUNYE_CATALOG: spark_catalog
          UBUNYE_SCHEMA: ubunye_examples
          UBUNYE_SINK: unity
          TAXI_MODEL_STORE: /tmp/ubunye/model_store
        run: |
          platforms/run_task.sh examples/04_ml_taxi_fare taxi_fare ml             feature_engineering model_training batch_inference

      - name: 03 · unstructured — off Databricks
        env:
          SOURCE_CATALOG: spark_catalog
          UBUNYE_CATALOG: spark_catalog
          UBUNYE_SCHEMA: ubunye_examples
          UBUNYE_SINK: unity
          UBUNYE_CORPUS: file:///tmp/ubunye/corpus
        run: platforms/run_task.sh examples/03_ingest_unstructured docs ingestion document_index

      - name: 08 · model monitoring — drift, decay, rollback, off Databricks
        # Reads 04's model and feature table. The registry is pathlib-based, so a plain
        # directory is all it needs — which is exactly why it CANNOT yet run on EMR or
        # Dataproc, where there is no filesystem to point it at. That is engine bug #6.
        env:
          SOURCE_CATALOG: spark_catalog
          UBUNYE_CATALOG: spark_catalog
          UBUNYE_SCHEMA: ubunye_examples
          UBUNYE_SINK: unity
          TAXI_MODEL_STORE: /tmp/ubunye/model_store
          TAXI_MODELS_DIR: ${{ github.workspace }}/examples/04_ml_taxi_fare/models
        run: platforms/run_task.sh examples/08_model_monitoring taxi_fare mlops monitor_model

      - name: Install the open-source model stack
        # The two examples that "could not leave Databricks" only could not because
        # they call Databricks-hosted serving endpoints. A hosted model has an
        # open-source substitute that runs on a CPU with no API key and no account.
        run: pip install "sentence-transformers>=3" "transformers>=4.44" "torch>=2.2" --extra-index-url https://download.pytorch.org/whl/cpu

      - name: 05 · RAG — with open-source models, no endpoint
        # MODEL_BACKEND=local swaps databricks-bge-large-en for MiniLM and
        # llama-3.1-8b for Qwen2.5-0.5B. The config.yaml does not move. The pipeline
        # does not move. Which model answers is business logic, and it lives in
        # serving.py where business logic belongs.
        #
        # The answers WILL be worse than an 8B model's, and that is not the claim.
        # The claim is that the process — chunk, embed, retrieve by cosine, ground the
        # answer, cite the sources — runs with no Databricks at all.
        env:
          SOURCE_CATALOG: spark_catalog
          UBUNYE_CATALOG: spark_catalog
          UBUNYE_SCHEMA: ubunye_examples
          UBUNYE_SINK: unity
          MODEL_BACKEND: local
          TORCH_THREADS: "2"
        run: |
          platforms/run_task.sh examples/05_rag_documents rag knowledge embed_chunks answer_questions

      - name: 06 · distillation — an open teacher, an open student
        # The teacher was an 8B Databricks endpoint; now it is Qwen2.5-0.5B on the CPU.
        # The student was, and remains, DistilBERT. Distillation is teacher -> student;
        # neither has to be hosted by anyone.
        env:
          SOURCE_CATALOG: spark_catalog
          UBUNYE_CATALOG: spark_catalog
          UBUNYE_SCHEMA: ubunye_examples
          UBUNYE_SINK: unity
          MODEL_BACKEND: local
          TORCH_THREADS: "2"
          STUDENT_MODEL_STORE: /tmp/ubunye/model_store
        run: |
          platforms/run_task.sh examples/06_finetune_llm reviews nlp label_reviews finetune_classifier

      - name: What actually landed on disk
        run: |
          . platforms/spark_env.sh
          python - <<'PY'
          from pyspark.sql import SparkSession
          spark = (SparkSession.builder.appName("check").enableHiveSupport().getOrCreate())
          spark.sparkContext.setLogLevel("ERROR")

          # Delta paths — examples 02, 09 and 11 wrote by path.
          for t in ["hourly_forecast", "rna_databases", "rna_sequence_profile"]:
              n = spark.read.format("delta").load(f"/tmp/ubunye/{t}").count()
              print(f"  path   {t:<28} {n:>7} rows")
              assert n > 0, f"{t} is empty"

          # Metastore tables — examples 01, 07 and 04 wrote with `format: unity`,
          # unchanged, against a plain Hive metastore.
          print()
          print("  databases:", [r.namespace for r in spark.sql("SHOW DATABASES").collect()])
          for db in ["ubunye_examples", "bakehouse", "nyctaxi"]:
              tabs = [r.tableName for r in spark.sql(f"SHOW TABLES IN {db}").collect()]
              print(f"  {db}: {sorted(tabs)}")

          print()
          expected = ["franchise_revenue", "product_revenue",          # 01
                      "clean_transactions", "quarantined_transactions", "contract_results",  # 07
                      "taxi_features", "taxi_model_metrics", "taxi_fare_predictions",        # 04
                      "documents", "document_chunks",                                        # 03
                      "chunk_embeddings", "rag_answers",                                     # 05
                      "labelled_reviews", "student_model_metrics"]                           # 06
          for t in expected:
              n = spark.table(f"ubunye_examples.{t}").count()
              print(f"  table  {t:<28} {n:>7} rows")
              assert n > 0, f"{t} is empty"
          PY

  docker:
    name: Docker container
    runs-on: ubuntu-latest
    outputs:
      fingerprint: ${{ steps.run.outputs.fingerprint }}
    steps:
      - uses: actions/checkout@v4

      - name: Build the image
        run: docker build -f platforms/docker/Dockerfile -t ubunye-portable:ci .

      - name: Run the task in the container
        id: run
        run: |
          set -euo pipefail
          docker run --rm ubunye-portable:ci | tee out.txt
          echo "fingerprint=$(grep -oP 'FINGERPRINT=\K.*' out.txt)" >> "$GITHUB_OUTPUT"

      - name: 02 · REST ingestion, in the container
        run: docker run --rm ubunye-portable:ci examples/02_ingest_rest_api weather ingestion hourly_forecast

      - name: 09 · JDBC, in the container
        run: docker run --rm ubunye-portable:ci examples/09_jdbc_ingest rnacentral ingestion ingest_rna

  kubernetes:
    name: Kubernetes (kind)
    runs-on: ubuntu-latest
    outputs:
      fingerprint: ${{ steps.run.outputs.fingerprint }}
    steps:
      - uses: actions/checkout@v4

      - name: Build the image
        run: docker build -f platforms/docker/Dockerfile -t ubunye-portable:ci .

      - name: Create a cluster
        uses: helm/kind-action@v1
        with: { cluster_name: ubunye }

      - name: Load the image into the cluster
        # kind nodes cannot see the host's docker daemon, so the image has to be
        # side-loaded. Skip this and the pod sits in ImagePullBackOff forever,
        # trying to fetch a tag that only exists on the runner.
        run: kind load docker-image ubunye-portable:ci --name ubunye

      - name: Run the task as a Kubernetes Job
        id: run
        run: |
          set -euo pipefail
          kubectl apply -f platforms/k8s/job.yaml
          kubectl wait --for=condition=complete --timeout=15m job/ubunye-portable \
            || { kubectl logs job/ubunye-portable --tail=100; exit 1; }
          kubectl logs job/ubunye-portable | tee out.txt
          echo "fingerprint=$(grep -oP 'FINGERPRINT=\K.*' out.txt)" >> "$GITHUB_OUTPUT"

  object-store:
    name: object storage (s3a:// via MinIO)
    runs-on: ubuntu-latest
    outputs:
      fingerprint: ${{ steps.run.outputs.fingerprint }}

    env:
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: ubunye
      S3_SECRET_KEY: ubunye-secret
      AWS_ACCESS_KEY_ID: ubunye
      AWS_SECRET_ACCESS_KEY: ubunye-secret
      AWS_EC2_METADATA_DISABLED: "true"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install the released engine + Spark + Delta
        run: pip install "pyspark==3.5.3" "delta-spark==3.2.0" "ubunye-engine[spark]==0.3.0" "requests>=2.28"

      - name: Start MinIO — a real S3-compatible server
        # Started as a plain container, NOT a `services:` block. The official minio
        # image needs a `server /data` command, and GitHub service containers cannot
        # override a command. (The first version used bitnami/minio, which starts a
        # server by default — and Bitnami has since withdrawn their public `latest`
        # tags, so the pull failed with `manifest unknown`.)
        #
        # Not a mock and not a stub: the pipeline talks to this through Hadoop's actual
        # S3A connector, the same one it would use against AWS.
        run: |
          docker run -d --name minio -p 9000:9000             -e MINIO_ROOT_USER=ubunye             -e MINIO_ROOT_PASSWORD=ubunye-secret             minio/minio:latest server /data

      - name: Wait for MinIO, and stage the corpus INTO the bucket
        # The bootstrap is the platform's job. On Databricks a notebook copies the
        # corpus to a volume; here we put it in an object store. The pipeline neither
        # knows nor cares which.
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break || sleep 2
          done
          aws --endpoint-url http://localhost:9000 s3 mb s3://ubunye 2>/dev/null || true
          aws --endpoint-url http://localhost:9000 s3 cp             examples/11_run_anywhere/data/corpus/ s3://ubunye/corpus/ --recursive
          aws --endpoint-url http://localhost:9000 s3 ls s3://ubunye/corpus/

      - name: Run the task against s3a:// -- the config is untouched
        id: run
        env:
          UBUNYE_DATA_ROOT: s3a://ubunye
          UBUNYE_SINK: s3
        run: |
          set -euo pipefail
          . platforms/spark_env.sh
          platforms/run_task.sh examples/11_run_anywhere portable ingestion document_index
          python platforms/fingerprint.py s3a://ubunye/documents s3a://ubunye/document_chunks | tee out.txt
          echo "fingerprint=$(grep -oP 'FINGERPRINT=.*' out.txt | cut -d= -f2)" >> "$GITHUB_OUTPUT"

  spark-submit:
    name: spark-submit (the shape AWS EMR and GCP Dataproc use)
    runs-on: ubuntu-latest
    outputs:
      fingerprint: ${{ steps.run.outputs.fingerprint }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install the released engine + Spark + Delta
        run: pip install "pyspark==3.5.3" "delta-spark==3.2.0" "ubunye-engine[spark]==0.3.0" "requests>=2.28"

      - name: Submit the job the way a cloud does
        id: run
        # EMR Serverless and Dataproc do NOT run `ubunye run`. There is no shell and no
        # console script on PATH — they hand a Python file to spark-submit. Every other
        # job in this matrix goes through the CLI, so this invocation shape was entirely
        # untested, and it is exactly where a first cloud run would fail.
        #
        # This proves it for free. The only thing left unknown about AWS and GCP is then
        # "does the cloud accept our job", not "does our code work when submitted".
        #
        # Note SPARK_MASTER is deliberately NOT set: unset means "let the platform
        # decide", which is what a cloud needs. spark-submit defaults to local[*] here.
        run: |
          set -euo pipefail
          DATA=/tmp/ubunye
          rm -rf "$DATA"; mkdir -p "$DATA/corpus"
          cp examples/11_run_anywhere/data/corpus/*.txt "$DATA/corpus/"

          export UBUNYE_SINK=s3
          export UBUNYE_DATA_ROOT="file://$DATA"

          spark-submit             --packages io.delta:delta-spark_2.12:3.2.0             --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension             --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog             --py-files platforms/fingerprint.py             platforms/spark_entrypoint.py             --task-dir examples/11_run_anywhere/pipelines/portable/ingestion/document_index             --mode PROD --dt 2026-07-13             --fingerprint "$DATA/documents" "$DATA/document_chunks" | tee out.txt

          echo "fingerprint=$(grep -oP 'FINGERPRINT=\K.*' out.txt)" >> "$GITHUB_OUTPUT"

  aws:
    name: AWS EMR Serverless (skips unless configured)
    runs-on: ubuntu-latest
    # Skips cleanly when the secrets are absent, exactly like deploy.yml. It is not
    # "unsupported" — it is unconfigured, and the difference matters: the day an account
    # exists, four secrets turn this green with no code change.
    #
    # I never see the keys. platforms/aws/setup.sh (run by the repo owner) creates a
    # bucket, a scoped IAM job role and an EMR Serverless application, and prints the
    # `gh secret set` lines. CI holds them; CI runs the job; I read the log.
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      AWS_EMR_APPLICATION_ID: ${{ secrets.AWS_EMR_APPLICATION_ID }}
      AWS_EMR_JOB_ROLE_ARN: ${{ secrets.AWS_EMR_JOB_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Are we configured for AWS?
        id: creds
        run: |
          if [[ -n "${AWS_S3_BUCKET}" && -n "${AWS_EMR_APPLICATION_ID}" && -n "${AWS_EMR_JOB_ROLE_ARN}" ]]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No AWS secrets — skipping EMR Serverless. Run platforms/aws/setup.sh to configure."
          fi

      - name: Say plainly whether this ran
        # A green tick on a job that SKIPPED reads as "the cloud works". It does not
        # work; it was never asked. Put the truth in the run summary where it cannot be
        # mistaken for a result — the whole point of this repo is that a green build
        # means something was actually executed.
        run: |
          if [ "${{ steps.creds.outputs.ok }}" = "true" ]; then
            echo "### AWS EMR Serverless: RAN" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### AWS EMR Serverless: **NOT RUN** — no credentials configured." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "This job is green because it was skipped, not because it passed." >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`platforms/aws/setup.sh\` and set the secrets it prints to turn this into a real run." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Submit to EMR Serverless
        if: steps.creds.outputs.ok == 'true'
        run: platforms/aws/submit.sh

  gcp:
    name: GCP Dataproc Serverless (skips unless configured)
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GCP_BUCKET: ${{ secrets.GCP_BUCKET }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4

      - name: Are we configured for GCP?
        id: creds
        run: |
          if [[ -n "${GCP_PROJECT}" && -n "${GCP_BUCKET}" ]]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No GCP secrets — skipping Dataproc. Run platforms/gcp/setup.sh to configure."
          fi

      - uses: google-github-actions/auth@v2
        if: steps.creds.outputs.ok == 'true'
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        if: steps.creds.outputs.ok == 'true'

      - name: Say plainly whether this ran
        # A green tick on a job that SKIPPED reads as "the cloud works". It does not
        # work; it was never asked. Put the truth in the run summary where it cannot be
        # mistaken for a result — the whole point of this repo is that a green build
        # means something was actually executed.
        run: |
          if [ "${{ steps.creds.outputs.ok }}" = "true" ]; then
            echo "### GCP Dataproc Serverless: RAN" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### GCP Dataproc Serverless: **NOT RUN** — no credentials configured." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "This job is green because it was skipped, not because it passed." >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`platforms/gcp/setup.sh\` and set the secrets it prints to turn this into a real run." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Submit to Dataproc Serverless
        if: steps.creds.outputs.ok == 'true'
        run: platforms/gcp/submit.sh

  models-in-a-container:
    name: RAG + distillation in Docker and Kubernetes (open models)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the base image
        run: docker build -f platforms/docker/Dockerfile -t ubunye-portable:ci .

      - name: Build the model image — weights baked IN
        # The weights are downloaded at BUILD time, then HF_HUB_OFFLINE=1 forbids the
        # network. A container that fetches a gigabyte on every start silently depends
        # on the internet, which a locked-down cluster or a VPC-isolated cloud job does
        # not have -- and that failure arrives after you have paid to start the job.
        #
        # This is the SAME artifact EMR Serverless and Dataproc Serverless take as a
        # custom container image. One image, four platforms; only the registry differs.
        run: |
          docker build -f platforms/docker/Dockerfile.ml             --build-arg BASE=ubunye-portable:ci -t ubunye-ml:ci .
          docker images ubunye-ml:ci --format "  image size: {{.Size}}"

      - name: Seed + 03 + 05 + 06, in the container
        # One container run: the metastore has to survive between tasks, and a fresh
        # container per task would throw it away.
        run: |
          docker run --rm             -e WITH_DISTILLATION=true             --entrypoint /app/platforms/models_demo.sh             ubunye-ml:ci

      - name: Create a Kubernetes cluster
        uses: helm/kind-action@v1
        with: { cluster_name: ubunye-ml }

      - name: Load the model image into the cluster
        run: kind load docker-image ubunye-ml:ci --name ubunye-ml

      - name: Run RAG on Kubernetes
        # The SAME script the container ran. The pod gets the bootstrap too -- the first
        # version told it to "run example 05" alone, and 05 reads the chunks that 03
        # produces, so it sat on an empty volume with nothing to read until it timed out.
        run: |
          set -euo pipefail
          kubectl apply -f platforms/k8s/job-models.yaml
          kubectl wait --for=condition=complete --timeout=25m job/ubunye-rag             || { echo "--- pod logs ---"; kubectl logs job/ubunye-rag --tail=80; exit 1; }
          kubectl logs job/ubunye-rag | tail -25

  ml-frameworks:
    name: sklearn vs PyTorch vs TensorFlow, off Databricks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install the three frameworks
        # TensorFlow needs numpy<2, which scipy and MLflow cannot live with unpinned.
        # This is a separate JOB for the same reason example 10 uses separate TASKS: the
        # three frameworks cannot share one interpreter, and the task is the unit of
        # isolation. Pinning them together is the only thing that makes them coexist.
        run: |
          pip install "pyspark==3.5.3" "delta-spark==3.2.0" "ubunye-engine[spark,ml]==0.3.0"                       "torch>=2.2" --extra-index-url https://download.pytorch.org/whl/cpu
          pip install "tensorflow" "numpy<2" "protobuf<5"

      - name: Seed, engineer features, then race the three frameworks
        env:
          SOURCE_CATALOG: spark_catalog
          UBUNYE_CATALOG: spark_catalog
          UBUNYE_SCHEMA: ubunye_examples
          UBUNYE_SINK: unity
          BENCH_MODEL_STORE: /tmp/ubunye/model_store
          TORCH_THREADS: "2"
        run: |
          set -euo pipefail
          . platforms/spark_env.sh
          python platforms/seed.py
          platforms/run_task.sh examples/04_ml_taxi_fare taxi_fare ml feature_engineering
          platforms/run_task.sh examples/10_ml_frameworks fare_bench ml             train_sklearn train_torch train_keras select_champion

      - name: The leaderboard
        run: |
          . platforms/spark_env.sh
          python - <<'PY'
          from pyspark.sql import SparkSession
          spark = SparkSession.builder.appName("board").enableHiveSupport().getOrCreate()
          spark.sparkContext.setLogLevel("ERROR")
          b = spark.table("ubunye_examples.fare_bench_leaderboard")
          b.select("rank","framework","score_rmse","test_rmse","train_seconds","verdict")            .orderBy("rank").show(truncate=False)
          rows = b.collect()
          got = sorted(r["framework"] for r in rows)
          assert got == ["pytorch","scikit-learn","tensorflow"], got
          PY

  identical:
    name: every platform produced the same output
    runs-on: ubuntu-latest
    needs: [local, docker, kubernetes, object-store, spark-submit]
    steps:
      - name: Compare the fingerprints
        run: |
          set -euo pipefail
          LOCAL='${{ needs.local.outputs.fingerprint }}'
          DOCKER='${{ needs.docker.outputs.fingerprint }}'
          K8S='${{ needs.kubernetes.outputs.fingerprint }}'
          S3A='${{ needs.object-store.outputs.fingerprint }}'
          SUBMIT='${{ needs.spark-submit.outputs.fingerprint }}'

          printf '  %-22s %s\n' "local Spark:" "$LOCAL" "Docker:" "$DOCKER" "Kubernetes:" "$K8S"

          # An empty fingerprint means the run produced nothing and the grep found
          # nothing — which would otherwise sail through as "all three matched".
          echo "  object store (s3a): $S3A"
          echo "  spark-submit      : $SUBMIT"
          for f in "$LOCAL" "$DOCKER" "$K8S" "$S3A" "$SUBMIT"; do
            [ -n "$f" ] || { echo "::error::a platform produced NO fingerprint"; exit 1; }
          done

          if [ "$LOCAL" = "$DOCKER" ] && [ "$LOCAL" = "$K8S" ]              && [ "$LOCAL" = "$S3A" ] && [ "$LOCAL" = "$SUBMIT" ]; then
            echo "::notice::identical output — local, Docker, Kubernetes, s3a://, spark-submit — $LOCAL"
          else
            echo "::error::the platforms disagree. Same config, same code, different data."
            exit 1
          fi
