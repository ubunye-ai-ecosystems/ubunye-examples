name: deploy

# Deploys every example to Databricks as an Asset Bundle, then RUNS them.
#
# Running them is the point. A bundle that deploys but produces an empty table is
# a bundle that looks healthy and is broken — so each notebook ends in assertions,
# and `bundle run` fails the job when they do.
#
# Authenticates with a service principal (OAuth M2M). No personal access tokens:
# a PAT belongs to a human, expires with them, and carries their permissions.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_jobs:
        description: "Run the jobs after deploying (not just deploy them)"
        type: boolean
        default: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # never kill a half-finished deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main

      - name: Check for workspace credentials
        id: creds
        # A fork has no secrets. Skip cleanly rather than failing red and teaching
        # contributors to ignore a red build.
        run: |
          if [[ -n "${DATABRICKS_HOST}" && -n "${DATABRICKS_CLIENT_ID}" && -n "${DATABRICKS_CLIENT_SECRET}" ]]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No Databricks credentials — skipping deploy."
          fi

      - name: Validate
        if: steps.creds.outputs.ok == 'true'
        run: databricks bundle validate --target ci

      - name: Deploy
        if: steps.creds.outputs.ok == 'true'
        run: databricks bundle deploy --target ci

      - name: Run — 01 · ingest structured (tables + SQL)
        if: steps.creds.outputs.ok == 'true' && inputs.run_jobs != false
        run: databricks bundle run ingest_tables_sql --target ci

      - name: Run — 02 · ingest structured (REST API)
        if: steps.creds.outputs.ok == 'true' && inputs.run_jobs != false
        run: databricks bundle run ingest_rest_api --target ci

      - name: Run — 03 · ingest unstructured (text + files)
        if: steps.creds.outputs.ok == 'true' && inputs.run_jobs != false
        run: databricks bundle run ingest_unstructured --target ci

      - name: Run — 04 · ML (features -> training -> inference)
        if: steps.creds.outputs.ok == 'true' && inputs.run_jobs != false
        # Three tasks with real dependencies: if the model fails its quality gate,
        # nothing is registered, inference has nothing to load, and this fails.
        # That is correct. Scoring with an unvetted model is worse than not scoring.
        run: databricks bundle run ml_taxi_fare --target ci

      - name: Run — 05 · RAG (embed -> retrieve -> answer)
        if: steps.creds.outputs.ok == 'true' && inputs.run_jobs != false
        run: databricks bundle run rag_documents --target ci

      - name: Run — 06 · distillation (LLM labels -> DistilBERT learns)
        if: steps.creds.outputs.ok == 'true' && inputs.run_jobs != false
        # The slowest job by far: fine-tuning on CPU takes about ten minutes.
        run: databricks bundle run finetune_llm --target ci

      - name: Run — 07 · data quality (contract, quarantine, fail loudly)
        if: steps.creds.outputs.ok == 'true' && inputs.run_jobs != false
        run: databricks bundle run data_quality --target ci

      - name: Run — 08 · model monitoring (drift, decay, rollback)
        if: steps.creds.outputs.ok == 'true' && inputs.run_jobs != false
        # Must come after 04: it monitors 04's model and reads its feature table.
        # It deliberately registers a broken model and rolls it back, so it leaves
        # the registry with a healthy production version — 04's inference task on
        # the next run still has something to load. The notebook asserts that.
        run: databricks bundle run model_monitoring --target ci
