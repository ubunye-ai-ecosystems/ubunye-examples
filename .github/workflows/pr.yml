name: pr

# Runs with NO secrets, so a pull request from a fork gets the same signal a
# maintainer does. Anything that needs a workspace lives in deploy.yml.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    name: validate + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install the released engine
        run: pip install -r requirements.txt

      - name: Validate every config
        # Catches a broken config.yaml in seconds, no cluster required.
        #
        # No env vars are set, on purpose: every value in these configs must have
        # a `| default(...)`, or the example is unrunnable by anyone who has not
        # read our secrets. If this step needs an export to pass, the example is
        # broken for its audience.
        run: |
          set -e
          ubunye validate -d examples/01_ingest_tables_sql/pipelines   -u retail    -p ingestion --all -dt 2026-07-13
          ubunye validate -d examples/02_ingest_rest_api/pipelines     -u weather   -p ingestion --all -dt 2026-07-13
          ubunye validate -d examples/03_ingest_unstructured/pipelines -u docs      -p ingestion --all -dt 2026-07-13
          ubunye validate -d examples/04_ml_taxi_fare/pipelines        -u taxi_fare -p ml        --all -dt 2026-07-13
          ubunye validate -d examples/05_rag_documents/pipelines       -u rag       -p knowledge --all -dt 2026-07-13
          ubunye validate -d examples/06_finetune_llm/pipelines        -u reviews   -p nlp       --all -dt 2026-07-13
          ubunye validate -d examples/07_data_quality/pipelines        -u quality   -p contracts --all -dt 2026-07-13
          ubunye validate -d examples/08_model_monitoring/pipelines    -u taxi_fare -p mlops     --all -dt 2026-07-13
          ubunye validate -d examples/09_jdbc_ingest/pipelines         -u rnacentral -p ingestion --all -dt 2026-07-13

      - name: Every task file must parse
        # A mangled f-string does not fail `ubunye validate` — it fails on the
        # cluster, ten minutes into a job. Catch it here, in one second.
        run: |
          python -m compileall -q examples/*/pipelines examples/*/models examples/*/notebooks

      - name: Unit tests
        run: pytest examples/*/tests -v

  bundle:
    name: bundle validate
    runs-on: ubuntu-latest
    # `databricks bundle validate` authenticates against the workspace — it
    # resolves ${workspace.file_path} and checks the identity it will deploy as.
    # There is no offline mode, so it cannot run on a fork PR (no secrets), and
    # pointing it at a fake host just fails DNS. Gate it, and let deploy.yml be
    # the real gate before anything lands in the workspace.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main

      - name: Check for credentials
        id: creds
        run: |
          if [[ -n "${DATABRICKS_HOST}" && -n "${DATABRICKS_CLIENT_ID}" && -n "${DATABRICKS_CLIENT_SECRET}" ]]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Databricks credentials — skipping bundle validation."
          fi

      - name: Validate the bundle
        if: steps.creds.outputs.ok == 'true'
        run: databricks bundle validate --target ci
