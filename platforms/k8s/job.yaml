# The same container, run as a Kubernetes Job.
#
# Note what this is NOT: it is not `spark-submit --master k8s://...` with a driver
# pod spawning executor pods. It is Spark in local[*] mode inside one pod — which is
# the honest shape for a task this size, and it is what most "Spark on Kubernetes"
# jobs actually are once you look at them.
#
# To fan out across executor pods instead, the only change is in the ENVIRONMENT, not
# the pipeline:
#
#     SPARK_MASTER: "k8s://https://kubernetes.default.svc"
#
# plus a service account with pod-create rights and spark.kubernetes.container.image.
# The config.yaml and transformations.py do not move. That is the claim, and this is
# where you would test it against a real cluster rather than a kind one.
apiVersion: batch/v1
kind: Job
metadata:
  name: ubunye-portable
spec:
  backoffLimit: 0 # a retry would hide a flake, and a flake is a finding
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: ubunye
          image: ubunye-portable:ci
          imagePullPolicy: Never # the image is side-loaded into kind, not pulled
          env:
            - name: SPARK_MASTER
              value: "local[*]"
            - name: UBUNYE_SINK
              value: "s3" # the generic path connector — nothing to do with AWS
            - name: UBUNYE_DATA_ROOT
              value: "file:///data"
            - name: DATA_DIR
              value: "/data"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests: { memory: "2Gi", cpu: "1" }
            limits: { memory: "3Gi" }
      volumes:
        # A JVM needs somewhere to write, and the model registry and Delta both want
        # a POSIX filesystem. emptyDir is enough here because the job is
        # self-contained; a real deployment would mount a PVC or an object store.
        - name: data
          emptyDir: {}
