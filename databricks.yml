# One bundle, every example. `databricks bundle deploy` puts them all in the
# workspace; `databricks bundle run <job>` executes one.
#
# There is no `new_cluster` block anywhere in this file, and that is deliberate:
# a task with no cluster key runs on serverless, which is the only compute a free
# Databricks workspace has. Adding a cluster spec here would make every example
# undeployable for most of the people it is written for.

bundle:
  name: ubunye-examples

variables:
  catalog:
    description: Unity Catalog catalog the examples write to.
    default: workspace
  schema:
    description: Unity Catalog schema the examples write to.
    default: ubunye_examples
  data_timestamp:
    description: The `dt` passed to every task.
    default: "2026-07-13"

sync:
  include:
    - examples/**

resources:
  jobs:
    # ---- ingestion -------------------------------------------------------
    ingest_tables_sql:
      name: "[ubunye] 01 · ingest structured — tables + SQL"
      max_concurrent_runs: 1
      tasks:
        - task_key: customer_revenue
          notebook_task:
            notebook_path: ./examples/01_ingest_tables_sql/notebooks/run_customer_revenue.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/01_ingest_tables_sql/pipelines/retail/ingestion/customer_revenue
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

    ingest_rest_api:
      name: "[ubunye] 02 · ingest structured — a public REST API"
      max_concurrent_runs: 1
      tasks:
        - task_key: hourly_forecast
          notebook_task:
            notebook_path: ./examples/02_ingest_rest_api/notebooks/run_hourly_forecast.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/02_ingest_rest_api/pipelines/weather/ingestion/hourly_forecast
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

    ingest_unstructured:
      name: "[ubunye] 03 · ingest unstructured — text + files"
      max_concurrent_runs: 1
      tasks:
        - task_key: document_index
          notebook_task:
            notebook_path: ./examples/03_ingest_unstructured/notebooks/run_document_index.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/03_ingest_unstructured/pipelines/docs/ingestion/document_index
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

    # ---- ML --------------------------------------------------------------
    # Two tasks, in order. Inference depends on engineering because it loads the
    # model that task registered — and if the model failed its quality gate,
    # nothing was registered and this job stops rather than scoring with a stale
    # one. That dependency is the deployment story, expressed as a DAG edge.
    ml_taxi_fare:
      name: "[ubunye] 04 · ML — features, training, inference"
      max_concurrent_runs: 1
      tasks:
        - task_key: feature_engineering
          notebook_task:
            notebook_path: ./examples/04_ml_taxi_fare/notebooks/run_feature_engineering.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/04_ml_taxi_fare/pipelines/taxi_fare/ml/feature_engineering
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

        - task_key: model_training
          depends_on:
            - task_key: feature_engineering
          notebook_task:
            notebook_path: ./examples/04_ml_taxi_fare/notebooks/run_model_training.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/04_ml_taxi_fare/pipelines/taxi_fare/ml/model_training
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

        # Depends on training because it loads the model training registered. If
        # the model failed its gate, nothing was registered, this task has nothing
        # to load, and the job stops — which is correct. Scoring with an unvetted
        # model is worse than not scoring at all.
        - task_key: batch_inference
          depends_on:
            - task_key: model_training
          notebook_task:
            notebook_path: ./examples/04_ml_taxi_fare/notebooks/run_batch_inference.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/04_ml_taxi_fare/pipelines/taxi_fare/ml/batch_inference
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

    rag_documents:
      name: "[ubunye] 05 · RAG — embed, then retrieve and answer"
      max_concurrent_runs: 1
      tasks:
        - task_key: embed_chunks
          notebook_task:
            notebook_path: ./examples/05_rag_documents/notebooks/run_embed_chunks.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/05_rag_documents/pipelines/rag/knowledge/embed_chunks
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

        # Retrieval depends on embedding for the obvious reason, but the tasks are
        # separate for a less obvious one: embedding is expensive and changes only
        # when documents change; answering is cheap and changes every time somebody
        # asks something. Fused, you would re-embed the corpus to answer one question.
        - task_key: answer_questions
          depends_on:
            - task_key: embed_chunks
          notebook_task:
            notebook_path: ./examples/05_rag_documents/notebooks/run_answer_questions.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/05_rag_documents/pipelines/rag/knowledge/answer_questions
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

    finetune_llm:
      name: "[ubunye] 06 · Distillation — an LLM labels, a small model learns"
      max_concurrent_runs: 1
      tasks:
        - task_key: label_reviews
          notebook_task:
            notebook_path: ./examples/06_finetune_llm/notebooks/run_label_reviews.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/06_finetune_llm/pipelines/reviews/nlp/label_reviews
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

        - task_key: finetune_classifier
          depends_on:
            - task_key: label_reviews
          notebook_task:
            notebook_path: ./examples/06_finetune_llm/notebooks/run_finetune_classifier.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/06_finetune_llm/pipelines/reviews/nlp/finetune_classifier
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

    data_quality:
      name: "[ubunye] 07 · Data quality — a contract, enforced"
      max_concurrent_runs: 1
      tasks:
        - task_key: validate_transactions
          notebook_task:
            notebook_path: ./examples/07_data_quality/notebooks/run_validate_transactions.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/07_data_quality/pipelines/quality/contracts/validate_transactions
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

    model_monitoring:
      name: "[ubunye] 08 · Model monitoring — drift, decay, rollback"
      max_concurrent_runs: 1
      tasks:
        - task_key: monitor_model
          notebook_task:
            notebook_path: ./examples/08_model_monitoring/notebooks/run_monitor_model.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/08_model_monitoring/pipelines/taxi_fare/mlops/monitor_model
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

    ml_frameworks:
      name: "[ubunye] 10 · Frameworks — sklearn vs PyTorch vs TensorFlow"
      max_concurrent_runs: 1
      tasks:
        # The three trainers have no depends_on between them, so they run in
        # PARALLEL. They append to one Delta table; concurrent appends do not
        # conflict under optimistic concurrency. Three overwrites would.
        - task_key: train_sklearn
          notebook_task:
            notebook_path: ./examples/10_ml_frameworks/notebooks/run_train_sklearn.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/10_ml_frameworks/pipelines/fare_bench/ml/train_sklearn
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

        - task_key: train_torch
          notebook_task:
            notebook_path: ./examples/10_ml_frameworks/notebooks/run_train_torch.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/10_ml_frameworks/pipelines/fare_bench/ml/train_torch
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

        - task_key: train_keras
          notebook_task:
            notebook_path: ./examples/10_ml_frameworks/notebooks/run_train_keras.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/10_ml_frameworks/pipelines/fare_bench/ml/train_keras
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

        # Waits for all three. A leaderboard built while a trainer is still running
        # would rank whoever happened to finish first.
        - task_key: select_champion
          depends_on:
            - task_key: train_sklearn
            - task_key: train_torch
            - task_key: train_keras
          notebook_task:
            notebook_path: ./examples/10_ml_frameworks/notebooks/run_select_champion.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/10_ml_frameworks/pipelines/fare_bench/ml/select_champion
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

    run_anywhere:
      name: "[ubunye] 11 · Run anywhere — the same task, on Databricks"
      max_concurrent_runs: 1
      tasks:
        - task_key: document_index
          notebook_task:
            notebook_path: ./examples/11_run_anywhere/notebooks/run_document_index.py
            base_parameters:
              task_dir: ${workspace.file_path}/examples/11_run_anywhere/pipelines/portable/ingestion/document_index
              catalog: ${var.catalog}
              schema: ${var.schema}
              dt: ${var.data_timestamp}
              mode: PROD

targets:
  # For a human deploying from a laptop. `mode: development` prefixes the job
  # names and pauses schedules, so you cannot accidentally trample a real one.
  dev:
    mode: development
    default: true

  # For CI. Authenticates with a service principal — see .github/workflows.
  ci:
    mode: development
